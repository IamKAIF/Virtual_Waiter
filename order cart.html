<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Order</title>
    <link rel="stylesheet" href="order cart.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
    <link href='https://fonts.googleapis.com/css?family=Mirza' rel='stylesheet'>
    <link href='https://fonts.googleapis.com/css?family=Inter' rel='stylesheet'>


  </head>


  <body>
  <div class="container">
    
    
     <div class="icons" >

    <i class="fas fa-bars"></i>
    </div>

    <div class="order">Order</div><br>


    <div class="item-details">

        <div class="rect" style="top: 155px" ></div>
        <img style="top: 164px; width: 61px;" src="https://encrypted-tbn3.gstatic.com/images?q=tbn:ANd9GcSiYLy29WAoCnn1aq8K4_8J2RKBdBRQkoLzup_LtE9bVkQZ1FX5Zv1uij5EnxfGrxDDj2E">
        <h style="top: 177px;">Big Mac</h>
        <p style="top: 195px;">Rs 240</p>

      <div class="quantity">
        <div class="dec" style="top: 203px"></div>
        <h id="decrement" style="top: 196px;">-</h>
           
        <div class="inp">
        <input type="number" style="top:206px" value="1" size="1"></div>
        
        <div class="inc" style="top: 203px"></div>
        <h id="increment" style="top: 196px">+</h>
      </div>
      
      <div class="rating" style="top: 177px">
      <i class="fa fa-star fa-xs" style="top: 8.33%"></i></div>
      <h style="top: 177px" id="rate">4.4</h>
    
    </div> 




    <div class="item-details">

      <div class="rect" style="top: 255px" ></div>
      <img style="top: 264px;" src="https://encrypted-tbn3.gstatic.com/images?q=tbn:ANd9GcQsczLv6bk4Z3JNs9HhlG-lb4O7qp3R7ndLnn0ikMvIg9nf-cmu">
      <h style="top: 277px; width: 102px;">Cheese Burst</h>
      <p style="top: 295px;">Rs 180</p>

    <div class="quantity">
      <div class="dec" style="top: 303px"></div>
      <h id="decrement" style="top:296px;">-</h>
        
      <div class="inp">
      <input type="number" style="top:306px" value="1" size="1"></div>
      
      <div class="inc" style="top: 303px"></div>
      <h id="increment" style="top: 296px">+</h>
    </div>
    
    <div class="rating" style="top: 277px">
    <i class="fa fa-star fa-xs" style="top: 8.33%"></i></div>
    <h style="top: 277px" id="rate">4.3</h>
  
   </div>




    <div class="select">
     <h>Select the table:</h>
    </div>


    <div class="quantity2">
      <div class="dec2">
        <h id="decrement2">-</h></div>
          
        <div class="inp2"></div>
        <input  type="number" value="00" size="1">
        
        <div class="inc2"></div>
        <h id="increment2">+</h>
    </div>





    <div class="col">
      <div class="subtotal">Subtotal</div><br>
      <span class="rate">Rs 420</span>
      <div class="button"></div>
      <div id="btn" >Confirm</div>
  </div>


        
 
    <!-- <div class="left">      

      <h>Subtotal </h><br>
      <p>Rs 420</p></div>


      
    <div class="right"></div>
      <button id="btn" >Confirm Order</button> -->
    
      
      



    
     
 </div>
</body>
</html>
